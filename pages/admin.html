<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFMS | Administration - Annonces</title>
    <link rel="stylesheet" href="../assets/css/index.css">
</head>
<body>
    <header id="header">
        <nav class="container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo_efms.jpeg" alt="EFMS Logo">
                <span class="logo-subtext">Espace Administration</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Retour au site</a></li>
                <li><a href="annonces.html">Voir les annonces</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-banner">
        <div class="container">
            <h1>Gestion des <span>Annonces</span></h1>
            <p>Publiez et gérez les annonces visibles sur la page publique du site.</p>
        </div>
    </div>

    <main>
        <section class="admin-container container">
            <div class="admin-panel">
                <h3>Publier une nouvelle annonce</h3>
                <form id="adminForm">
                    <div class="form-group">
                        <label for="titre">Titre de l'annonce</label>
                        <input type="text" id="titre" placeholder="Ex: Promotion -20% sur les reprogrammations ECU" required>
                    </div>
                    <div class="form-group">
                        <label for="contenu">Contenu de l'annonce</label>
                        <textarea id="contenu" placeholder="Rédigez le contenu détaillé de votre annonce..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Publier</button>
                </form>
            </div>

            <div class="admin-list">
                <h3>Annonces publiées</h3>
                <div id="adminList"></div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('adminForm');
            const adminList = document.getElementById('adminList');

            const loadAnnonces = () => {
                let annonces = JSON.parse(localStorage.getItem('efms_annonces')) || [];
                adminList.innerHTML = '';

                if (annonces.length === 0) {
                    adminList.innerHTML = '<div class="empty-state"><p>Aucune annonce publiée.</p></div>';
                } else {
                    annonces.sort((a, b) => new Date(b.date) - new Date(a.date));
                    annonces.forEach((annonce, index) => {
                        const div = document.createElement('div');
                        div.className = 'admin-item';
                        div.innerHTML = `
                            <div>
                                <strong>${annonce.titre}</strong>
                                <div class="date-label">${new Date(annonce.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                            </div>
                            <button class="btn-danger" data-index="${index}">Supprimer</button>
                        `;
                        adminList.appendChild(div);
                    });

                    adminList.querySelectorAll('.btn-danger').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const idx = parseInt(btn.dataset.index);
                            if (confirm('Supprimer cette annonce ?')) {
                                let a = JSON.parse(localStorage.getItem('efms_annonces')) || [];
                                a.sort((x, y) => new Date(y.date) - new Date(x.date));
                                a.splice(idx, 1);
                                localStorage.setItem('efms_annonces', JSON.stringify(a));
                                loadAnnonces();
                            }
                        });
                    });
                }
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const titre = document.getElementById('titre').value.trim();
                const contenu = document.getElementById('contenu').value.trim();
                if (!titre || !contenu) return;

                let annonces = JSON.parse(localStorage.getItem('efms_annonces')) || [];
                annonces.push({ titre, contenu, date: new Date().toISOString() });
                localStorage.setItem('efms_annonces', JSON.stringify(annonces));
                form.reset();
                loadAnnonces();
            });

            loadAnnonces();
        });
    </script>
</body>
</html>

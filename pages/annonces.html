<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFMS | Annonces &amp; Actualités</title>
    <meta name="description" content="Consultez les dernières annonces, promotions et actualités d'EFMS - Electronics Full Multi Service.">
    <link rel="stylesheet" href="../assets/css/index.css">
</head>
<body>
    <header id="header">
        <nav class="container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo_efms.jpeg" alt="EFMS Logo">
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">À Propos</a></li>
                <li><a href="annonces.html" class="active">Annonces</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="contact.html" class="btn btn-primary nav-cta">Devis Gratuit</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu principal" title="Ouvrir le menu">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </header>

    <div class="page-banner">
        <div class="container">
            <h1 data-reveal>Nos <span>Annonces</span></h1>
            <p data-reveal>Promotions en cours, nouvelles prestations et actualités de notre atelier.</p>
        </div>
    </div>

    <main>
        <section class="announcements-section">
            <div class="container">
                <div id="announcementsList"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 EFMS - Electronics Full Multi Service | Kolwezi, Lualaba, RDC | <a href="admin.html">Espace Admin</a></p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('announcementsList');
            let annonces = JSON.parse(localStorage.getItem('efms_annonces')) || [];

            if (annonces.length === 0) {
                listContainer.innerHTML = '<div class="empty-state"><h3>Aucune annonce pour le moment</h3><p>Revenez bientôt pour découvrir nos dernières actualités et promotions.</p></div>';
            } else {
                annonces.sort((a, b) => new Date(b.date) - new Date(a.date));
                annonces.forEach(annonce => {
                    const dateObj = new Date(annonce.date);
                    const formattedDate = dateObj.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
                    const card = document.createElement('div');
                    card.className = 'announcement-card';
                    card.setAttribute('data-reveal', '');
                    card.innerHTML = `
                        <h3>${annonce.titre}</h3>
                        <div class="announcement-date">Publié le ${formattedDate}</div>
                        <p>${annonce.contenu}</p>
                    `;
                    listContainer.appendChild(card);
                });
            }
        });
    </script>
    <script src="../assets/js/index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFMS | Annonces &amp; Actualités</title>
    <meta name="description" content="Consultez les dernières annonces, promotions et actualités d'EFMS - Electronics Full Multi Service.">
    <link rel="icon" type="image/jpeg" href="../assets/images/logo_efms.jpeg">
    <link rel="stylesheet" href="../assets/css/index.css">
</head>
<body>
    <header id="header">
        <nav class="container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo_efms.jpeg" alt="EFMS Logo">
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">À Propos</a></li>
                <li><a href="annonces.html" class="active">Annonces</a></li>
                <li><a href="avis.html">Avis</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="contact.html" class="btn btn-primary nav-cta">Devis Gratuit</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu principal" title="Ouvrir le menu">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </header>

    <div class="page-banner">
        <div class="container">
            <h1 data-reveal>Nos <span>Annonces</span></h1>
            <p data-reveal>Promotions en cours, nouvelles prestations et actualités de notre atelier.</p>
        </div>
    </div>

    <main>
        <section class="announcements-section">
            <div class="container">
                <div id="announcementsList"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 EFMS - Electronics Full Multi Service | Kolwezi, Lualaba, RDC | <a href="../admin/index.html">Espace Admin</a></p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('announcementsList');
            const API_URL = 'http://localhost:3000/api';

            try {
                listContainer.innerHTML = '<p style="text-align:center;">Chargement des annonces...</p>';
                const res = await fetch(`${API_URL}/annonces`);
                if (!res.ok) throw new Error("Server Error");
                let annonces = await res.json();
                
                listContainer.innerHTML = '';
                if (annonces.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state"><h3>Aucune annonce pour le moment</h3><p>Revenez bientôt pour découvrir nos dernières actualités et promotions.</p></div>';
                } else {
                    annonces.forEach((annonce, i) => {
                        const dateObj = new Date(annonce.created_at);
                        const formattedDate = dateObj.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
                        
                        const card = document.createElement('div');
                        card.className = 'announcement-card';
                        
                        // Add animation delay based on index
                        card.style.opacity = '0';
                        card.style.transform = 'translateY(20px)';
                        card.style.transition = 'all 0.6s ease';
                        setTimeout(() => {
                            card.style.opacity = '1';
                            card.style.transform = 'translateY(0)';
                        }, i * 100);

                        let mediaHtml = '';
                        if (annonce.media_url) {
                            if (annonce.media_type === 'video') {
                                mediaHtml = `
                                    <div style="margin-top: 1rem; border-radius: 8px; overflow: hidden;">
                                        <video src="${annonce.media_url}" controls style="width: 100%; max-height: 400px; display: block; background: #000;"></video>
                                    </div>
                                `;
                            } else {
                                mediaHtml = `
                                    <div style="margin-top: 1rem; border-radius: 8px; overflow: hidden;">
                                        <img src="${annonce.media_url}" alt="${annonce.titre}" style="width: 100%; max-height: 400px; object-fit: contain; display: block; border: 1px solid rgba(255,255,255,0.1);">
                                    </div>
                                `;
                            }
                        }

                        card.innerHTML = `
                            <div style="padding: 2rem;">
                                <h3>${annonce.titre}</h3>
                                <div class="announcement-date" style="color:var(--primary); font-size:0.9rem; margin-bottom:1rem; font-weight:bold;">Publié le ${formattedDate}</div>
                                <p style="white-space: pre-wrap; line-height: 1.6;">${annonce.contenu}</p>
                            </div>
                            ${mediaHtml}
                        `;
                        // Remove default bottom padding if media exists
                        if (annonce.media_url) {
                            card.style.paddingBottom = "0";
                            card.style.borderBottomLeftRadius = "0";
                            card.style.borderBottomRightRadius = "0";
                        }
                        
                        listContainer.appendChild(card);
                    });
                }
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<div class="empty-state" style="color:var(--danger)"><h3>Erreur Serveur</h3><p>Impossible de charger les annonces à partir du backend.</p></div>';
            }
        });
    </script>
    <script src="../assets/js/index.js"></script>
</body>
</html>

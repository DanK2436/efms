name: admin_efms
description: A new Flutter project for EFMS Admin with Supabase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.2
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  intl: ^0.18.1
  provider: ^6.1.1
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.1
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_efms.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0E11"
  adaptive_icon_foreground: "assets/images/logo_efms.jpeg"
  round_icon: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
